<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js"></script>
    <link href="styles.css" rel="stylesheet">
</head>
<div>
    <h1 class="titulo">Formulario de Paciente</h1>
    <main>
    <form id="formulario-paciente" >
        <h2 class="titulo">Información del Paciente</h2>
        <section class="grupo-campo">
        <div>
            <label for="documento">Documento:</label>
            <input type="text" id="documento" name="documento" required>
        </div>
        <div>
            <label for="nombres">Nombres:</label>
            <input type="text" id="nombres" name="nombres" required>
        </div>
        <div>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" required>
        </div>
        <div>
            <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>
        </div>
        <div>
            <label for="genero">Género:</label>
            <select id="genero" name="genero" required>
                <option value="">Seleccione</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        <div>
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad" required>
        </div>
        <div>
            <label for="eps">EPS:</label>
            <input type="text" id="eps" name="eps" required>
        </div>
        </section>
            <label>El usuario tiene algún tipo de tratamiento:</label><br>

    <input type="radio" id="op1" name="opcion" value="1">
    <label for="op1">Sí</label>

    <input type="radio" id="op2" name="opcion" value="2">
    <label for="op2">No</label>

        <button type="submit">Guardar Paciente</button>
    <div class="modal-overlay" id="modalOverlay">
    <div class="modal">

        <div>
            <h3>Detalles del Tratamiento</h3>
            <button id="closeBtn">&times;</button>
        </div>

        <form id="tratamientoForm">
        <section class="grupo-campo">
            <label>Tipo de Tratamiento </label>
            <select id="tipoTratamiento" required>
                <option value="">-- Selecciona --</option>
                <option>Fisioterapia</option>
                <option>Quimioterapia</option>
                <option>Radioterapia</option>
                <option>Cirugía</option>
            </select><br><br>

            <label>Costo</label>
            <input type="number" id="costo" required><br><br>

            <label>Estado</label>
            <select id="estadoTratamiento" required>
                <option value="">-- Selecciona --</option>
                <option>Activo</option>
                <option>Pendiente</option>
                <option>Finalizado</option>
            </select><br><br>

            <label>Fecha Inicio *</label>
            <input type="date" id="fechaInicio" required><br><br>

            <!-- CHECKBOX -->
            <input type="checkbox" id="tratamientoEnCurso">
            <label for="tratamientoEnCurso">¿Sigue en curso?</label><br><br>

            <!-- FECHA FIN -->
            <div id="fechaFinField">
                <label>Fecha Fin *</label>
                <input type="date" id="fechaFin"><br><br>
            </div>

            <button type="button" id="cancelBtn">Cancelar</button>
            <button type="submit">Guardar</button>

        </form>
    </div>
</div>
</main>


</body>
</html>
