<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<div>
    <main>
        <h1 class="titulo">Formulario de Paciente</h1>

        <form id="formulario-paciente">
            <h2 class="titulo">Información del Paciente</h2>
            <section class="grupo-campo">
                <div>
                    <label for="documento">Documento:</label>
                    <input type="text" id="documento" name="documento" required>
                </div>
                <div>
                    <label for="nombres">Nombres:</label>
                    <input type="text" id="nombres" name="nombres" required>
                </div>
                <div>
                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" name="apellidos" required>
                </div>
                <div>
                    <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>
                </div>
                <div>
                    <label for="genero">Género:</label>
                    <select id="genero" name="genero" required>
                        <option value="">Seleccione</option>
                        <option value="masculino" class="option1">Masculino</option>
                        <option value="femenino" class="option1">Femenino</option>
                        <option value="otro" class="option1">Otro</option>
                    </select>
                </div>
                <div>
                    <label for="ciudad">Ciudad:</label>
                    <input type="text" id="ciudad" name="ciudad" required>
                </div>
                <div>
                    <label for="eps">EPS:</label>
                    <input type="text" id="eps" name="eps" required>
                </div>
            </section>
            <section class="grupo-campo2">
                <label>El usuario tiene algún tipo de tratamiento:</label><br>
                <input type="radio" id="op1" name="opcion" value="1">
                <label for="op1">Sí</label>
                <input type="radio" id="op2" name="opcion" value="2">
                <label for="op2">No</label>
                <button type="submit" class="">Guardar Paciente</button>
            </section>
        </form>
        <div class="modal-overlay" id="modalOverlay">
            <form id="tratamientoForm" class="tratamientoform" >
            <div>
                <h2 class="h2titulo" >Detalles del Tratamiento</h2>
            </div>
                <section>
                    <section class="grupo-campo1">
                        <label>Tipo de Tratamiento </label>
                    <select id="tipoTratamiento" required>
                        <option value="">Selecciona</option>
                        <option class="option1">Fisioterapia</option>
                        <option class="option1">Quimioterapia</option>
                        <option class="option1">Radioterapia</option>
                        <option class="option1">Cirugía</option>
                    </select>
                    <label>Costo</label>
                    <input type="number" id="costo" required>
                    <label>Estado</label>
                    <select id="estadoTratamiento" required>
                        <option value="">Selecciona</option>
                        <option class="option1">Activo</option>
                        <option class="option1">Pendiente</option>
                        <option class="option1">Finalizado</option>
                    </select>
                    <label>Fecha Inicio</label>
                    <input type="date" id="fechaInicio" required>
                    <div id="fechaFinField">
                        <label>Fecha Fin</label>
                        <input type="date" id="fechaFin">
                    </div>
                    <div class="checkboxtratamiento">
                    <label for="tratamientoEnCurso">¿Sigue en curso?</label>
                    <input type="checkbox" id="tratamientoEnCurso">
                    </div>
                    </section>
                    <div class="button1">
                        <button type="button" id="cancelBtn" class="button2">Cancelar</button>
                        <br>
                        <button type="submit" id="guardarBtn" class="button2">Guardar</button>
                    </div>
                    </form>
        </div>
</div>
</main>
</body>
</html>
